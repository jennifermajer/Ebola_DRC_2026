notes: |
  Raw file (data/ACLED_conflict/raw/ACLED_Africa_weekly_agregated_20250502.csv) is
  weekly aggregates per province (ADMIN1), not per health zone. The CENTROID_LATITUDE
  / CENTROID_LONGITUDE columns are province-level summary coordinates (three distinct
  points total across 346 rows), so point-in-polygon would not produce real
  zone-level event counts. Real aggregation requires event-level ACLED data
  (a future PR).
