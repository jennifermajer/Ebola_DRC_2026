notes: |
  Raw OD matrix CSVs (raw/mobilite_od_matrix_*_mar2026.csv) were extracted upstream
  from Flowminder provincial PDF reports (workflow logged in README.md). process.py
  in this folder rewrites them into the repo's contract: column 'origin' is renamed
  'nom', alias-only names are normalised to canonical Nom, and the bare 'Lubunga'
  label is disambiguated to 'Lubunga (Tshopo)' using the flowminder coverage area.
  Coverage area: Ituri, Nord-Kivu, Haut-Uele, western Tshopo (per README.md).
