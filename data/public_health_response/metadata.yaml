period: "2026-06-01 to 2026-06-08 (processed extracts; see README)"
notes: |
  Manually extracted from INSP SitRep MVE PDFs in raw/ (SitRep_MVE_001-2026.pdf
  through SitRep_MVE_012_2026.pdf; 003 not committed).
  Pillar-specific operational activities were extracted from the SitRep narrative
  sections. For each pillar, processed vectors are stored as
  insp_sitrep____daily.csv with nom, date, and a text value column
  containing the reported activity.
  Records are assigned to the health zones explicitly mentioned in the SitRep.
  When an activity is reported at national level without reference to a specific
  health zone, it is stored in the corresponding national_* file using
  nom = DRC. National records are subsequently available for country-level
  analysis and reporting.
  Health zone names are normalised to canonical names during processing.
  nom may contain NA when no valid geographic assignment can be made.
  Data complements data/epi/.
  process.R does not parse PDFs directly; it processes manually extracted data
  and standardises zone names before export.
