source: "Institut National de Santé Publique (INSP) Situation Reports — SitRep MVE series (2026 Bundibugyo Ebolavirus outbreak)"
citation: "Institut National de Santé Publique (INSP), Democratic Republic of the Congo. Situation reports on the 2026 Bundibugyo Ebolavirus outbreak (SitRep MVE 001, 002, 004–012, 2026; report 003 not committed). Health-zone geometry: DRC_Health_zones.shp (see data/shapefiles/)."
source_url: "https://insp.cd/"
retrieved_on: "2026-06-06"
license: "INSP outbreak sitreps; reuse with attribution to INSP and citation of the specific report number and date. Confirm distribution terms with INSP before external republication."
contact: "pierre.akilimali@insp.cd"
runtime: none
period: "2026-05-14 to 2026-06-05 (processed extracts; see README)"
notes: |
  Manually extracted from INSP SitRep MVE PDFs in raw/ (SitRep_MVE_001-2026.pdf
  through SitRep_MVE_011-2026.pdf and SitRep_MVE_012_2026.pdf; 003 not committed).
  Twenty-eight processed vectors: insp_sitrep__<metric>__daily.csv with nom, date,
  and one value column. Outbreak-zone tables (cases, deaths, contacts, hospitalisation
  from 2026-05-20, PoE from 2026-05-20) cover 21 canonical zones only.   Four national_cumulative_* files use nom = DRC with one row per report date;
  GeoJSON build broadcasts the latest DRC row to all zones. nom may include
  Sans Fiche and NA (excluded from GeoJSON). ND = not reported.
  Complements data/epi/.
  process.R normalises nom to canonical names; does not parse PDFs.