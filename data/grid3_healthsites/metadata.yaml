notes: |
  National GRID3 health-facility points (~38k) intersected with 519 DRC health zones; no
  facility-type filter. data/grid3_healthsites/process.R unzips
  raw/COD_GRID3_health_facilities_v8_0_*.zip, joins to
  data/shapefiles/DRC_Health_zones.shp, exports
  processed/grid3_healthsites__healthsite_count__static.csv and
  processed/grid3_healthsites__healthsite_density__static.csv (nom with province suffix
  for Bili/Lubunga). Maps: raw_point_data_plot.png, healthsite_density_data_plot.png.
  Complements data/healthsites_io/ (OSM/Healthsites.io, filtered subset). See README.md.
