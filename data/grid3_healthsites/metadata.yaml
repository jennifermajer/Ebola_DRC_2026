source: "GRID3 COD Health Facilities v8.0, aggregated to DRC health zones"
citation: "Center for Integrated Earth System Information (CIESIN), Columbia University; Ministère de la Santé Publique, Hygiène et Prévention, Democratic Republic of the Congo; GRID3 (2025). GRID3 COD — Health Facilities v8.0. https://doi.org/10.7916/f1ft-y872. Health-zone geometry: DRC_Health_zones.shp (see data/shapefiles/)."
