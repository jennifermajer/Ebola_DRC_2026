notes: |
  Annex A (PDF pages 8–11): proportion of Vodacom subscribers seen in Bunia, Mongbwalu,
  or Rwampara during 3–23 April who were later observed in each destination health zone
  at D+7, D+14, D+21, D+28, D+31 (30 Apr, 7 May, 14 May, 21 May, 24 May 2026).

  Pipeline:
    1. extract_pdf_annex.py → raw/short_trips_destination_rankings.csv
    2. process.py → five processed/*.matrix.csv snapshots (3×N each) and five
       matching long vectors (destination `nom` + `outflow_<YYYYMMDD>` column)

  Processed matrices use canonical destination `nom` column headers. Origin rows are
  Bunia, Mongbalu, Rwampara with identical destination proportions per snapshot
  (combined cohort). Long vectors melt each matrix for GeoJSON embedding. Zone labels
  follow data/flowminder/process.py resolution rules.
